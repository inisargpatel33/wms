<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WMS Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="try.css" />
 

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>


<body>

<div class="bg-wrapper">

  <!-- HEADER -->
  <header class="top-bar">
    <div class="left">← <span>Overview</span></div>
    <div class="right">
      🔔 <img src="https://i.pravatar.cc/36" /> <span>Rohan ▾</span>
    </div>
  </header>

  <!-- MAIN WHITE CONTAINER -->
  <section class="dashboard-shell">

    <!-- TOP CARDS -->
    <div class="cards-row">
      <div class="balance-card">
        <p>Total Balance</p>
        <h1>₹14,206</h1>
        <div class="card-footer">
          <span>**** 6345</span>
          <button>INR ▾</button>
        </div>
      </div>

      <div class="budget-card">
        <h3>Monthly Budget</h3>
        <div class="budget-inner">
          <div class="progress-ring">
            <span>58%</span>
          </div>
          <div>
            <strong>₹2,864</strong> of ₹4,000
            
          </div>
        </div>
      </div>
    </div>

    <!-- ACCOUNTS -->
    <div class="accounts">
      <h2>Accounts</h2>
      <button class="add-category-btn">＋ Add Category</button>

      <div class="account">
        <div class="left"><span class="icon food">🍔</span> Food</div>
        <div class="right">₹1,200 ›</div>
      </div>

      <div class="account">
        <div class="left"><span class="icon travel">✈️</span> Travel</div>
        <div class="right">₹3,500 ›</div>
      </div>

      <div class="account">
        <div class="left"><span class="icon shopping">🛍</span> Shopping</div>
        <div class="right">₹800 ›</div>
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <button class="nav-btn active">🏠 <span>Home</span></button>
      <button class="nav-btn">📊 <span>Analysis</span></button>
      <button class="nav-btn">💼 <span>Wallets</span></button>
      <button class="nav-btn">👤 <span>Profile</span></button>
    </nav>

  </section>
</div>


<!-- popup add form -->
 <div class="modal-overlay" id="categoryModal">
  <div class="modal">
    <h3>Add New Category</h3>

    <input type="text" id="categoryName" placeholder="Category name (eg. Bills)" />
    <input type="text" id="categoryEmoji" placeholder="Category emoji (eg. 🍔 ✈️ 🏠)" maxlength="2" />
    <input type="number" id="categoryAmount" placeholder="Amount" />
    
    <div class="modal-actions">
      <button id="cancelBtn">Cancel</button>
      <button id="addBtn">Add</button>
    </div>
  </div>
</div>


<!-- remove category -->

<div class="modal-overlay" id="discardModal">
  <div class="modal">
    <h3>Discard Category</h3>

    <p class="warning-text">
      ⚠️ This amount will be transferred to main account
    </p>

    <div class="modal-actions">
      <button id="discardCancel">Cancel</button>
      <button id="discardConfirm">Discard</button>
    </div>
  </div>
</div>



 <script src="script.js"></script>

</body>
</html>
