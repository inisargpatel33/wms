<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WMS Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='landing/dstyle.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="bg-wrapper">

  <!-- HEADER -->
  <header class="top-bar">
    <div class="left">← <span>Overview</span></div>
    <div class="right">
      🔔 <img src="https://i.pravatar.cc/36" /> <span>Rohan ▾</span>
    </div>
  </header>

  <!-- MAIN WHITE CONTAINER -->
  <section class="dashboard-shell">

    <!-- TOP CARDS -->
    <div class="cards-row">

      <div class="balance-card">
        <p>Total Balance</p>
        <h1>₹14,206</h1>
        <div class="card-footer">
          <span>**** 6345</span>
          <button>INR ▾</button>
        </div>
      </div>

      <div class="budget-card">
        <h3>Monthly Budget</h3>
        <div class="budget-inner">
          <div class="progress-ring">
            <span>58%</span>
          </div>
          <div>
            <strong>₹2,864</strong> of ₹4,000
            <p>₹2864 of ₹4000 left</p>
          </div>
        </div>
      </div>

    </div>

    <!-- ACCOUNTS -->
    <div class="accounts">
      <h2>Accounts</h2>

      <div class="account">
        <div class="left">
          <span class="icon food">🍔</span> Food
        </div>
        <div class="right">₹1,200 ›</div>
      </div>

      <div class="account">
        <div class="left">
          <span class="icon travel">✈️</span> Travel
        </div>
        <div class="right">₹3,500 ›</div>
      </div>

      <div class="account">
        <div class="left">
          <span class="icon shopping">🛍</span> Shopping
        </div>
        <div class="right">₹800 ›</div>
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
  <button class="nav-btn active">
    🏠 <span>Home</span>
  </button>

  <button class="nav-btn">
    📊 <span>Analysis</span>
  </button>

  <button class="nav-btn">
    💼 <span>Wallets</span>
  </button>

  <button class="nav-btn">
    👤 <span>Profile</span>
  </button>
</nav>




  </section>
</div>

</body>
</html>
