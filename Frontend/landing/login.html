<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WMS – Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='landing/style.css') }}" />
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <img src="{{ url_for('static', filename='img/wallet.svg') }}" alt="">
      <span>WMS</span>
    </div>
    <a href="{{ url_for('login') }}" class="launch-btn">HOME</a>
  </header>

  <!-- MAIN -->
  <main class="features-section">
    <h1 class="features-title">Welcome back</h1>

    <div class="auth-card">

     
        <!-- ✅ SAFE FLASH MESSAGE BLOCK -->
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          {% for message in messages %}
            <p style="text-align:center;
                      margin-bottom:15px;
                      font-weight:bold;
                      color:red;">
              {{ message }}
            </p>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <!-- FIXED FORM -->
      <form method="POST" action="{{ url_for('login') }}">

        <div class="auth-field">
          <label>Email</label>
          <input name="email" type="email" required />
        </div>

        <div class="auth-field">
          <label>Password</label>
          <input name="password" type="password" required />
        </div>

        <div style="display:flex;gap:12px;align-items:center;justify-content:center;margin-top:12px;">
          <button type="submit" class="primary auth-btn">Login</button>

          <a href="{{ url_for('signup') }}"
             class="secondary"
             style="padding:10px 20px;border-radius:8px;text-decoration:none;">
            Create Account
          </a>
        </div>

      </form>

    </div>
  </main>

</body>
</html>
