<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WMS – Profile</title>

<link rel="stylesheet" href="{{ url_for('static', filename='landing/style.css') }}">

</head>

<body>

<header class="header">

<div class="logo">
<img src="{{ url_for('static', filename='img/wallet.svg') }}" alt="">
<span>WMS</span>
</div>

<a href="/dashboard" class="launch-btn">HOME</a>

</header>


<main class="features-section">

<h1 class="features-title">Profile</h1>

<div class="auth-card">

<form id="profileForm">

<div class="auth-field">
<label>Full Name</label>
<input id="fullname" name="fullname" type="text" value="{{ user.fullname }}" readonly>
</div>

<div class="auth-field">
<label>Email</label>
<input id="email" name="email" type="email" value="{{ user.email }}" readonly>
</div>

<div class="auth-field">
<label>Wallet ID</label>
<input type="text" value="{{ user.wallet_id }}" readonly>
</div>

<div class="action-group">

<button type="button" id="edit-btn" class="primary auth-btn">
Edit Profile
</button>

<button type="button" id="back-btn" class="secondary">
Go Back
</button>

</div>

</form>

<p id="msg" style="text-align:center;margin-top:12px;"></p>

</div>

</main>


<script>

const editBtn = document.getElementById("edit-btn");
const fullname = document.getElementById("fullname");
const email = document.getElementById("email");
const msg = document.getElementById("msg");

let editing = false;

editBtn.onclick = () => {

if(!editing){

editing = true;

fullname.removeAttribute("readonly");
email.removeAttribute("readonly");

editBtn.textContent = "Save";

}

else{

fetch("/update_profile",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

fullname: fullname.value,
email: email.value

})

})
.then(res=>res.json())
.then(data=>{

msg.style.color="green";
msg.textContent=data.message;

fullname.setAttribute("readonly",true);
email.setAttribute("readonly",true);

editBtn.textContent="Edit Profile";

editing=false;

});

}

};

</script>

</body>
</html>
