<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='landing/style.css') }}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="bg-wrapper">

  <!-- MAIN CARD -->
  <div class="main-card">

    <!-- TOP HEADER -->
    <div class="profile-header">
      <div class="profile-img"></div>
      <h2>{{ name }}</h2>
      <p>{{ email }}</p>
    </div>

    <!-- PROFILE DETAILS -->
    <div class="profile-content">

      <div class="info-card">
      <span>Email ID</span>
      <strong>{{ email }}</strong>
      </div>

      <div class="info-card">
        <span>Member Since</span>
        <strong>{{ member_since }}</strong>
      </div>

      <div class="info-card">
        <span>Wallet ID</span>
        <strong>{{ wallet_id }}</strong>
      </div>

      <button class="edit-btn">Edit Profile</button>

    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
      <span>Home</span>
      <span>Analysis</span>
      <span>Wallets</span>
      <span class="active">Profile</span>
    </div>

  </div>

</div>

</body>
</html>
