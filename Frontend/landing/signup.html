<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WMS – Sign Up</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="logo">
      <img src="../img/wallet.svg" alt="">
      <span>WMS</span>
    </div>
    <a href="index.html" class="launch-btn">HOME</a>
  </header>

  <main class="features-section">
    <h1 class="features-title">Create your account</h1>

    <div class="auth-card">
      <form id="signup-form">
        <div class="auth-field">
          <label for="name">Full name</label>
          <input id="name" name="name" type="text" required />
        </div>
        <div class="auth-field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />
        </div>
        <div class="auth-field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required />
        </div>
        <div class="auth-field">
          <label for="confirm">Confirm Password</label>
          <input id="confirm" name="confirm" type="password" required />
        </div>
        <div style="display:flex;gap:12px;align-items:center;justify-content:center;margin-top:12px;">
          <button type="submit" class="primary auth-btn">Sign Up</button>
          <a href="login.html" class="secondary" style="padding:10px 20px;border-radius:8px;text-decoration:none;display:inline-flex;align-items:center;">Sign In</a>
        </div>
      </form>
      <p id="msg" style="text-align:center;margin-top:12px;color:#c33"></p>
    </div>
  </main>
