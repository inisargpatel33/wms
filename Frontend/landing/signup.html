<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WMS – Sign Up</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='landing/style.css') }}">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <img src="{{ url_for('static', filename='img/wallet.svg') }}" alt="Wallet">
      <span>WMS</span>
    </div>

    <!-- Change this to your actual home route name if different -->
    <a href="/" class="launch-btn">HOME</a>
  </header>

  <!-- MAIN SECTION -->
  <main class="features-section">
    <h1 class="features-title">Create your account</h1>

    <div class="auth-card">

      

      <!-- SIGNUP FORM -->
      <form method="POST" action="{{ url_for('register') }}">

        <div class="auth-field">
          <label>Full Name</label>
          <input type="text" name="name" required>
        </div>

        <div class="auth-field">
          <label>Email</label>
          <input type="email" name="email" required>
        </div>

        <div class="auth-field">
          <label>Password</label>
          <input type="password" name="password" required>
        </div>

        <div class="auth-field">
          <label>Confirm Password</label>
          <input type="password" name="confirm" required>
        </div>
        
        <!-- ✅ SAFE FLASH MESSAGE BLOCK -->
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          {% for message in messages %}
            <p style="text-align:center;
                      margin-bottom:15px;
                      font-weight:bold;
                      color:red;">
              {{ message }}
            </p>
          {% endfor %}
        {% endif %}
      {% endwith %}
        <div style="display:flex; gap:12px; align-items:center; justify-content:center; margin-top:15px;">

          <button type="submit" class="primary auth-btn">
            Sign Up
          </button>

          <!-- Direct URL to avoid endpoint error -->
          <a href="/login"
             class="secondary"
             style="padding:10px 20px; border-radius:8px; text-decoration:none; display:inline-flex; align-items:center;">
            Sign In
          </a>

        </div>

      </form>

    </div>
  </main>

</body>
</html>
