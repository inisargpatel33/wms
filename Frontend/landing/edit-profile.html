<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WMS – Edit Profile</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <img src="../img/wallet.svg" alt="">
      <span>WMS</span>
    </div>
    <a href="index.html" class="launch-btn">HOME</a>
  </header>

  <!-- MAIN -->
  <main class="features-section">
    <h1 class="features-title">Edit Profile</h1>

    <div class="auth-card">
      <form id="edit-form">
        <div class="auth-field">
          <label for="fullname">Full Name</label>
          <input id="fullname" name="fullname" type="text" placeholder="Enter your full name" required />
        </div>

        <div class="auth-field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required />
        </div>

        <div class="auth-field">
          <label for="phone">Phone</label>
          <input id="phone" name="phone" type="tel" placeholder="+1 555-123-4567" />
        </div>

        <div class="action-group">
          <button type="submit" class="primary auth-btn">Save Changes</button>
          <button id="cancel-btn" type="button" class="secondary">Cancel</button>
        </div>

        <p id="msg" style="text-align:center;margin-top:12px;color:#070;">&nbsp;</p>
      </form>
    </div>
  </main>

  <script>
    (function(){
      const form = document.getElementById('edit-form');
      const cancelBtn = document.getElementById('cancel-btn');
      const msg = document.getElementById('msg');

      // for now just prevent default and display message
      form.addEventListener('submit', function(e){
        e.preventDefault();
        msg.textContent = 'Profile updated.';
        setTimeout(()=> msg.textContent = '', 2500);
      });

      cancelBtn.addEventListener('click', function(){
        window.location.href = 'profile.html';
      });
    })();
  </script>

</body>
</html>
